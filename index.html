<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Relatórios de Teste — projeto-automacao</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --card: #1e293b;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --cypress: #69d3a7;
        --k6: #7d64ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
        padding: 2rem;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at top, #1e293b, var(--bg));
        color: var(--text);
      }
      header { text-align: center; }
      h1 { margin: 0 0 0.5rem; font-size: clamp(1.6rem, 4vw, 2.4rem); }
      header p { margin: 0; color: var(--muted); }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1.5rem;
        width: min(720px, 100%);
      }
      .card {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        padding: 1.75rem;
        border-radius: 16px;
        background: var(--card);
        border: 1px solid rgba(148, 163, 184, 0.15);
        text-decoration: none;
        color: inherit;
        transition: transform 0.15s ease, border-color 0.15s ease;
      }
      .card:hover { transform: translateY(-4px); }
      .card.cypress:hover { border-color: var(--cypress); }
      .card.k6:hover { border-color: var(--k6); }
      .card .icon { font-size: 2.25rem; }
      .card h2 { margin: 0; font-size: 1.25rem; }
      .card p { margin: 0; color: var(--muted); font-size: 0.95rem; }
      .tag {
        align-self: flex-start;
        margin-top: 0.25rem;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .cypress .tag { background: rgba(105, 211, 167, 0.15); color: var(--cypress); }
      .k6 .tag { background: rgba(125, 100, 255, 0.18); color: var(--k6); }
      footer { color: var(--muted); font-size: 0.85rem; text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <h1>Relatórios de Teste</h1>
      <p>Escolha qual relatório deseja visualizar</p>
    </header>

    <main class="cards">
      <a class="card cypress" href="./cypress/">
        <span class="icon">🧪</span>
        <h2>Testes Cypress</h2>
        <p>Relatório Allure (API, E2E e Cucumber) com histórico de execuções.</p>
        <span class="tag">Allure</span>
      </a>

      <a class="card k6" href="./performance/">
        <span class="icon">⚡</span>
        <h2>Testes de Performance</h2>
        <p>Relatório do teste de carga executado com o k6.</p>
        <span class="tag">k6</span>
      </a>
    </main>

    <footer>
      Publicado automaticamente via GitHub Actions • projeto-automacao
    </footer>
  </body>
</html>
