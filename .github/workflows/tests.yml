name: Testes Automatizados

# Execução exclusivamente manual (sem parâmetros), pela aba "Actions" do GitHub.
on:
  workflow_dispatch:

# Permissão necessária para publicar o relatório na branch gh-pages.
permissions:
  contents: write

jobs:
  testes:
    name: Cypress + Allure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Instala dependências (com cache), o binário do Cypress e executa a suíte.
      - name: Executar a suíte Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
        env:
          CYPRESS_apiKey: ${{ secrets.CYPRESS_APIKEY }}
      - name: Recuperar histórico do Allure (gh-pages)
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # Converte os resultados (allure-results) em um relatório HTML com histórico.
      # subfolder: cypress -> o relatório fica publicado na subpasta /cypress do Pages.
      - name: Gerar relatório Allure (com histórico)
        uses: simple-elf/allure-report-action@v1.14
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          subfolder: cypress

      # Publica o relatório do Cypress em /cypress (destination_dir não apaga /performance).
      - name: Publicar relatório Cypress no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history/cypress
          destination_dir: cypress

      # Publica a página inicial (escolha do relatório) na raiz, sem apagar as subpastas.
      - name: Publicar página inicial no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .github/pages
          keep_files: true
