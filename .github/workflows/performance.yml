name: Testes de Performance (k6)

# Execução manual pela aba "Actions" do GitHub.
# Teste de carga é pesado (~7 min, pico de 500 usuários), por isso não roda a cada push.
on:
  workflow_dispatch:

# Permissão necessária para publicar o relatório na branch gh-pages.
permissions:
  contents: write

jobs:
  k6:
    name: k6 - Teste de carga
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Instala o binário do k6 no runner (a run-k6-action não instala o k6).
      - name: Instalar k6
        uses: grafana/setup-k6-action@v1

      # Executa o(s) teste(s) de carga da pasta k6/tests.
      - name: Executar teste de carga
        uses: grafana/run-k6-action@v1
        with:
          path: k6/tests/books-load.js

      # Mantém o relatório também como artefato para download (mesmo se os thresholds falharem).
      - name: Publicar relatório como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: k6/reports/books-load.html
          if-no-files-found: warn

      # Prepara o site do relatório k6 (index.html) para o GitHub Pages.
      - name: Preparar site do relatório k6
        if: always()
        run: |
          mkdir -p public-k6
          if [ -f k6/reports/books-load.html ]; then
            cp k6/reports/books-load.html public-k6/index.html
          else
            echo "<h1>Relatório do k6 não foi gerado</h1>" > public-k6/index.html
          fi

      # Publica o relatório de performance em /performance (destination_dir não apaga /cypress).
      - name: Publicar relatório de performance no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public-k6
          destination_dir: performance

      # Publica a página inicial (escolha do relatório) na raiz, sem apagar as subpastas.
      - name: Publicar página inicial no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .github/pages
          keep_files: true
